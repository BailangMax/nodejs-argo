<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D古风美女展示</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            /* 幽暗的古风背景色 */
            background-color: #1a0b12; 
        }
        #info {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            color: #ffcccc;
            font-family: 'KaiTi', '楷体', serif;
            font-size: 28px;
            letter-spacing: 4px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }
        #loading {
            position: absolute;
            top: 50%;
            width: 100%;
            text-align: center;
            color: #ffaa00;
            font-family: 'KaiTi', '楷体', serif;
            font-size: 18px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="info">❀ 幻 梦 ❀</div>
    <div id="loading">场景渲染中...<br>请在代码中配置您的古风美女模型路径 (GLTF/GLB)</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. 初始化场景、相机和渲染器
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a0b12, 0.06); // 添加浪漫的夜雾效果

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 4); // 默认相机位置（适合看全身/半身）

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping; // 电影级色调映射
        renderer.toneMappingExposure = 1.1;
        document.body.appendChild(renderer.domElement);

        // 添加鼠标控制器，可以360度旋转查看
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1, 0); // 视角对准人物中心

        // 2. 唯美光影设置
        // 暖色环境光
        const ambientLight = new THREE.AmbientLight(0xffd5b5, 0.6); 
        scene.add(ambientLight);

        // 模拟清冷月光（主光源）
        const moonlight = new THREE.DirectionalLight(0x88bbff, 1.5);
        moonlight.position.set(-5, 10, -5);
        scene.add(moonlight);

        // 模拟灯笼暖光（补光，打在脸部或侧身会很好看）
        const lanternLight = new THREE.PointLight(0xff5500, 3, 10);
        lanternLight.position.set(2, 1.5, 2);
        scene.add(lanternLight);

        // 3. 唯美特效：漫天萤火虫
        const particleCount = 150;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for(let i = 0; i < particleCount * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 10;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({
            color: 0xffd077,
            size: 0.04,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending // 叠加发光模式
        });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // 4. 加载3D模型
        const loader = new GLTFLoader();
        
        // ⚠️ 关键步骤：请在这里填入你的 3D 模型文件路径
        // 比如你可以去 Sketchfab 下载一个免费的古风人物 .glb 文件，放到同一目录下
        const modelUrl = ''; // 示例：'./gufeng_beauty.glb'

        if (modelUrl) {
            loader.load(modelUrl, function(gltf) {
                const model = gltf.scene;
                // 可以根据模型大小调整缩放比例： model.scale.set(1, 1, 1);
                // 可以调整模型位置： model.position.set(0, 0, 0);
                scene.add(model);
                document.getElementById('loading').style.display = 'none'; // 隐藏加载提示
            }, undefined, function(error) {
                console.error('模型加载失败:', error);
                document.getElementById('loading').innerText = '模型加载失败，请检查文件路径。';
            });
        }

        // 5. 渲染与动画循环
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // 让萤火虫缓缓飘动
            const positions = particles.geometry.attributes.position.array;
            for(let i = 1; i < particleCount * 3; i += 3) {
                positions[i] += Math.sin(time + i) * 0.0015; // Y轴上下浮动
            }
            particles.geometry.attributes.position.needsUpdate = true;

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 窗口缩放适配
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
