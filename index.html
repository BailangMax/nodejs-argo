<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艺术人像画廊 | Aesthetic Gallery</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 顶部氛围背景光晕 */
        .ambient-glow {
            position: fixed;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.15) 0%, rgba(99, 102, 241, 0.05) 50%, transparent 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* 网页头部 */
        header {
            text-align: center;
            margin: 60px 0 40px;
            z-index: 1;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            background: linear-gradient(to right, #ff8da1, #b392ac);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: #64748b;
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 画廊网格布局 */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1200px;
            padding: 0 20px 80px;
            z-index: 1;
        }

        /* 照片卡片外框 */
        .photo-card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px rgba(255, 255, 255, 0.08) solid;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 鼠标悬浮卡片效果 */
        .photo-card:hover {
            transform: translateY(-8px);
            border-color: rgba(236, 72, 153, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                        0 0 20px rgba(236, 72, 153, 0.1);
        }

        /* 图片容器 */
        .img-container {
            width: 100%;
            height: 450px;
            overflow: hidden;
            position: relative;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 鼠标悬浮图片放大 */
        .photo-card:hover .img-container img {
            transform: scale(1.05);
        }

        /* 渐变遮罩层（让底部文字更清晰） */
        .img-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(11, 15, 25, 0.9) 0%, transparent 100%);
        }

        /* 卡片文字介绍区域 */
        .card-info {
            padding: 25px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-info h3 {
            font-size: 1.25rem;
            font-weight: 400;
            margin-bottom: 6px;
            color: #f1f5f9;
        }

        .card-info p {
            font-size: 0.85rem;
            color: #94a3b8;
            line-height: 1.4;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            header h1 { font-size: 2rem; }
            .gallery-grid { grid-template-columns: 1fr; gap: 25px; }
            .img-container { height: 400px; }
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <header>
        <h1>MUSE GALLERY</h1>
        <p>光影与人像艺术诗篇</p>
    </header>

    <main class="gallery-grid">
        
        <div class="photo-card">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=600&q=80" alt="Portrait 1">
                <div class="img-overlay"></div>
            </div>
            <div class="card-info">
                <h3>霓虹序曲</h3>
                <p>捕捉都市夜幕下的流光溢彩，与深邃眼眸中的温柔瞬间。</p>
            </div>
        </div>

        <div class="photo-card">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=600&q=80" alt="Portrait 2">
                <div class="img-overlay"></div>
            </div>
            <div class="card-info">
                <h3>半夏日和</h3>
                <p>午后胶片质感的自然光影，定格微风吹拂发丝的纯净美好。</p>
            </div>
        </div>

        <div class="photo-card">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=600&q=80" alt="Portrait 3">
                <div class="img-overlay"></div>
            </div>
            <div class="card-info">
                <h3>暮色微醺</h3>
                <p>落日余晖洒在面颊上的金色剪影，优雅与感性的视觉交织。</p>
            </div>
        </div>

    </main>

</body>
</html>
